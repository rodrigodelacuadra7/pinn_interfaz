services:
  pinn-web:
    build: .
    image: pinn-web:local
    container_name: pinn-web
    ports:
      - "${HOST_PORT:-8000}:7860"
    environment:
      - PORT=7860
      - DJANGO_DEBUG=0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-change-me-in-prod}
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=http://localhost:${HOST_PORT:-8000}
      # MODEL_PATH y SCALERS_PATH se usan solo como fallback si no hay registro activo en la DB
      - MODEL_PATH=/models/model_fase2_seed2718.pt
      - SCALERS_PATH=/models/scalers_trial16.pkl
    volumes:
      # Volúmenes nombrados para persistencia de DB y modelos subidos por el admin
      - pinn-db:/app/data
      - pinn-media:/app/media
      # Fallback: archivos del repo raíz (read-only, solo si no hay registro en DB)
      - ../model_fase2_seed2718.pt:/models/model_fase2_seed2718.pt:ro
      - ../scalers_trial16.pkl:/models/scalers_trial16.pkl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pinn-db:
  pinn-media:
